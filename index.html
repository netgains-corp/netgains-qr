<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator | NetGains</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000000; color: #ffffff; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        /* Lade-Spinner Animation */
        .spinner { border: 3px solid rgba(45,212,191,0.1); border-top-color: #2dd4bf; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Verhindert horizontales Scrollen bei den absoluten BG-Elementen */
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-black text-white p-6 relative">

    <!-- Hintergrund-Deko (exakt wie im Original) -->
    <div class="bg-glow top-[-10%] left-[-5%] w-[500px] h-[500px] bg-teal-800/20"></div>
    <div class="bg-glow bottom-[-10%] right-[-5%] w-[500px] h-[500px] bg-cyan-800/20"></div>

    <!-- Main Card -->
    <div class="max-w-lg w-full glass-panel p-8 md:p-10 rounded-3xl shadow-2xl flex flex-col items-center text-center relative z-10 transition-all duration-500">
        
        <!-- Badge -->
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-teal-500/10 border border-teal-500/20 text-teal-300 text-[10px] font-black tracking-widest uppercase mb-4 shadow-[0_0_20px_rgba(45,212,191,0.1)]">
            NetGains Automation
        </div>
        
        <!-- Titel -->
        <h1 class="text-3xl font-black uppercase tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400 mb-4 drop-shadow-lg">
            QR Generator
        </h1>
        
        <!-- Beschreibung -->
        <p class="text-sm text-slate-400 mb-8 leading-relaxed max-w-sm">
            Gib deine Ziel-URL ein. Das System generiert über <strong class="text-slate-200">n8n</strong> einen hochauflösenden QR-Code, der sich perfekt für Web und Print eignet.
        </p>

        <!-- Eingabebereich URL -->
        <div class="w-full mb-4 relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                <i class="fa-solid fa-link"></i>
            </div>
            <input type="url" id="urlInput" placeholder="https://netgains.de" 
                class="w-full bg-[#0a0a0a] border border-slate-700/50 rounded-xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all shadow-inner">
        </div>

        <!-- Eingabebereich Passwort -->
        <div class="w-full mb-6 relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                <i class="fa-solid fa-lock"></i>
            </div>
            <input type="password" id="passwordInput" placeholder="Zugangscode (Optional)" 
                class="w-full bg-[#0a0a0a] border border-slate-700/50 rounded-xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all shadow-inner">
        </div>

        <!-- Generieren Button -->
        <button id="generateBtn" onclick="generateQR()" class="w-full py-4 mb-2 rounded-xl bg-gradient-to-r from-teal-500 to-cyan-600 hover:from-teal-400 hover:to-cyan-500 text-black font-black uppercase tracking-widest shadow-[0_0_20px_rgba(45,212,191,0.3)] transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-3">
            <i class="fa-solid fa-qrcode text-lg" id="btnIcon"></i>
            <span id="btnText">QR Code Generieren</span>
        </button>
        
        <!-- Limit Anzeige -->
        <p id="limitText" class="text-xs text-slate-500 font-medium tracking-wide mb-4">Noch 5 von 5 Anfragen heute übrig.</p>

        <!-- Preview Area (Standardmäßig versteckt) -->
        <div id="resultContainer" class="hidden flex-col items-center w-full transition-opacity duration-500 opacity-0 mt-4">
            
            <div class="w-48 h-48 p-2 mb-6 rounded-3xl bg-white shadow-[0_0_40px_rgba(45,212,191,0.2)] flex items-center justify-center overflow-hidden">
                <img id="qrImage" src="" alt="Generierter QR Code" class="w-full h-full object-cover transition-opacity duration-300 opacity-0">
            </div>

            <button onclick="downloadQR()" class="w-full py-4 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-black uppercase tracking-widest shadow-[0_0_20px_rgba(99,102,241,0.3)] transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-3">
                <i class="fa-solid fa-download text-lg"></i>
                PNG Herunterladen
            </button>
        </div>
    </div>

    <script>
        // TRAGE HIER DEINE PRODUKTIONS-WEBHOOK URL VON N8N EIN (z.B. https://n8n.netgains.de/webhook/generate-qr)
        const N8N_WEBHOOK_URL = 'https://n8n.srv1164949.hstgr.cloud/webhook/generate-qr';
        const MAX_DAILY_REQUESTS = 5;

        // --- Limit Tracker Logik ---
        function getDailyUsage() {
            const today = new Date().toDateString();
            const usageData = localStorage.getItem('netgains_qr_usage');
            let usage = usageData ? JSON.parse(usageData) : { date: today, count: 0 };
            
            // Wenn ein neuer Tag angebrochen ist, Zähler zurücksetzen
            if (usage.date !== today) {
                usage = { date: today, count: 0 };
            }
            return usage;
        }

        function updateLimitText() {
            const usage = getDailyUsage();
            const remaining = Math.max(0, MAX_DAILY_REQUESTS - usage.count);
            const limitTextElement = document.getElementById('limitText');
            limitTextElement.innerText = `Noch ${remaining} von ${MAX_DAILY_REQUESTS} Anfragen heute übrig.`;
            
            if(remaining === 0) {
                limitTextElement.classList.replace('text-slate-500', 'text-red-400');
            }
        }

        // Initiale Limit-Anzeige beim Laden
        updateLimitText();

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (err) {
                return false;
            }
        }

        async function generateQR() {
            let urlInput = document.getElementById('urlInput').value.trim();
            let passwordInput = document.getElementById('passwordInput').value.trim();
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const resultContainer = document.getElementById('resultContainer');
            const qrImage = document.getElementById('qrImage');
            const generateBtn = document.getElementById('generateBtn');

            // 1. Prüfe Tageslimit
            const usage = getDailyUsage();
            if (usage.count >= MAX_DAILY_REQUESTS) {
                alert("Du hast dein Tageslimit von 5 QR-Codes erreicht. Komm morgen wieder!");
                return;
            }

            // URL Validierung (fügt ggf. https:// hinzu)
            if (!urlInput) {
                alert("Bitte gib eine URL ein.");
                return;
            }
            if (!/^https?:\/\//i.test(urlInput)) {
                urlInput = 'https://' + urlInput;
                document.getElementById('urlInput').value = urlInput;
            }
            if (!isValidUrl(urlInput)) {
                alert("Bitte gib eine gültige URL ein.");
                return;
            }

            // UI in Lade-Status versetzen
            btnText.innerText = "Generiert...";
            btnIcon.className = "spinner";
            generateBtn.classList.add('opacity-80', 'pointer-events-none');
            qrImage.classList.remove('opacity-100');

            try {
                // PRODUKTION: n8n Einbindung
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Hier senden wir das Passwort sicher an n8n mit!
                    body: JSON.stringify({ 
                        url: urlInput,
                        password: passwordInput 
                    })
                });
                
                if (response.status === 401) throw new Error("Falsches Passwort!");
                if (!response.ok) throw new Error("Netzwerkfehler");
                
                const data = await response.json();
                
                // Wir holen das Base64 Bild, das n8n zurückgibt
                const imageUrl = data.qrUrl; 

                if (!imageUrl) {
                    throw new Error("n8n hat kein gültiges Bild zurückgegeben (qrUrl fehlt).");
                }

                // Bild laden und anzeigen
                qrImage.onload = () => {
                    // Erfolgreich! Zähler erhöhen
                    usage.count += 1;
                    localStorage.setItem('netgains_qr_usage', JSON.stringify(usage));
                    updateLimitText();

                    resultContainer.classList.remove('hidden');
                    
                    // Kurzer Timeout für CSS Transition
                    setTimeout(() => {
                        resultContainer.classList.remove('opacity-0');
                        qrImage.classList.add('opacity-100');
                    }, 50);

                    // Button zurücksetzen
                    btnText.innerText = "QR Code Generieren";
                    btnIcon.className = "fa-solid fa-qrcode text-lg";
                    generateBtn.classList.remove('opacity-80', 'pointer-events-none');
                };

                qrImage.onerror = () => {
                    alert("Das Bild konnte nicht geladen werden. Bitte prüfe den Output in n8n.");
                    // Button zurücksetzen
                    btnText.innerText = "Erneut versuchen";
                    btnIcon.className = "fa-solid fa-qrcode text-lg";
                    generateBtn.classList.remove('opacity-80', 'pointer-events-none');
                };

                // Zuweisung startet den Ladevorgang
                qrImage.src = imageUrl;

            } catch (error) {
                console.error("Fehler:", error);
                
                if (error.message === "Falsches Passwort!") {
                    alert("Zugriff verweigert: Das eingegebene Passwort ist falsch.");
                } else {
                    alert("Es gab ein Problem bei der Generierung. Siehe Konsole.");
                }
                
                // Button zurücksetzen
                btnText.innerText = "Erneut versuchen";
                btnIcon.className = "fa-solid fa-qrcode text-lg";
                generateBtn.classList.remove('opacity-80', 'pointer-events-none');
            }
        }

        async function downloadQR() {
            const qrImageSrc = document.getElementById('qrImage').src;
            if(!qrImageSrc) return;

            try {
                // Fetch als Blob umgeht CORS-Probleme beim Download in der Vorschau
                const response = await fetch(qrImageSrc);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement("a");
                a.download = `NetGains-QR.png`;
                a.href = blobUrl;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                console.error("Download Error:", e);
                // Fallback, falls CORS den Fetch blockiert (z.B. bei der dummy API)
                const a = document.createElement("a");
                a.download = `NetGains-QR.png`;
                a.href = qrImageSrc;
                a.target = "_blank";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        // Enter-Taste im Eingabefeld löst den Button aus
        document.getElementById("urlInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                generateQR();
            }
        });
    </script>
</body>
</html>
